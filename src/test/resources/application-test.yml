spring:
  datasource:
    url: jdbc:h2:mem:coffee_order;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    # 스키마 생성 전략(E1-3) 확정: dev와 동일하게 Flyway(H2 MySQL 호환 모드)가 DDL을 소유하고
    # Hibernate는 validate만 수행(프로파일 간 일관성 유지). 근거: docs/design/schema-strategy.md
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coffee_order}?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:coffee}
    password: ${DB_PASSWORD:coffee}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 스키마 생성 전략(E1-3) 확정: Flyway가 DDL을 소유. Hibernate는 validate로 엔티티-스키마
    # 매핑 불일치만 검증(스키마 변경 금지). 근거: docs/design/schema-strategy.md
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}

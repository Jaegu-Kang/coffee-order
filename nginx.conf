# E6-1 태스크3(다중 인스턴스 기동 시나리오 문서화) 시연 전용 로드밸런서 설정.
# docs/design/multi-instance-scale-check.md 참고. app 서비스가 `docker compose --scale app=N`으로
# 늘어난 여러 컨테이너를 라운드로빈으로 분산한다. Docker 임베디드 DNS가 서비스명(app)을
# 스케일된 컨테이너 수만큼의 A 레코드로 응답하며, nginx는 시작(또는 reload) 시점에 이를
# 모두 읽어 업스트림 목록으로 확장한다(동적 재해석은 하지 않음 — 아래 문서의 "주의" 참고).
events {}

http {
    upstream coffee_order_app {
        server app:8080;
    }

    log_format upstream_log '$request -> upstream=$upstream_addr status=$status';

    server {
        listen 80;
        access_log /dev/stdout upstream_log;

        location / {
            proxy_pass http://coffee_order_app;
            proxy_set_header Host $host;
        }
    }
}

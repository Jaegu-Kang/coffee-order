# 로컬 개발 전용 docker-compose 설정.
# 이 파일의 계정/비밀번호는 로컬 개발용 값이며 운영 환경에서 재사용하지 않는다.
# application-dev.yml 기본값(coffee_order / coffee / coffee / 3306)과 일치시킴.
services:
  mysql:
    image: mysql:8.0
    container_name: coffee-order-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: coffee_order
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee
      MYSQL_ROOT_PASSWORD: coffee-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcoffee-root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 로컬 개발 전용 Kafka(KRaft 단일 노드, Zookeeper 미사용).
  # 앱은 localhost:9092 로 접속한다(application-dev.yml 연동은 별도 태스크에서 처리).
  kafka:
    image: apache/kafka:3.7.0
    container_name: coffee-order-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
